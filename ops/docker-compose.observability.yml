services:
  prometheus:
    image: prom/prometheus:latest
    container_name: cloud_agent_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/cloud_agent_alerts.yml:/etc/prometheus/rules/cloud_agent_alerts.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: cloud_agent_grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/cloud_agent_overview_dashboard.json:/var/lib/grafana/dashboards/cloud_agent_overview_dashboard.json:ro
      - grafana_data:/var/lib/grafana

volumes:
  prometheus_data:
  grafana_data:
